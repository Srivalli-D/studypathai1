<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assignments – StudyPath AI Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    .filter-bar{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.25rem;}
    .filter-btn{padding:.35rem .85rem;border-radius:20px;font-size:.78rem;font-weight:500;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;transition:all .2s;}
    .filter-btn.active{background:rgba(56,189,248,.15);color:var(--primary);border-color:rgba(56,189,248,.3);}
    .assign-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1rem;}
    .assign-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.25rem;transition:all .25s;display:flex;flex-direction:column;gap:.75rem;}
    .assign-card:hover{border-color:var(--border-strong);transform:translateY(-2px);}
    .assign-card.submitted{opacity:.7;}
  </style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/guard.js"></script>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header"><a href="index.html" class="brand-wrap"><div class="brand-mark">S</div><div class="brand-text">StudyPath AI Pro <span>Career & Study Companion</span></div></a></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html"     class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
    <a href="performance.html"   class="nav-item"><span class="nav-icon">📊</span> Performance</a>
    <a href="roadmap.html"       class="nav-item"><span class="nav-icon">🗺️</span> AI Roadmap</a>
    <a href="study-planner.html" class="nav-item"><span class="nav-icon">📚</span> Study Planner</a>
    <a href="skills.html"        class="nav-item"><span class="nav-icon">🚀</span> Skills</a>
    <a href="applications.html"  class="nav-item"><span class="nav-icon">💼</span> Applications</a>
    <a href="assignments.html"   class="nav-item"><span class="nav-icon">📋</span> Assignments</a>
    <a href="notes.html"         class="nav-item"><span class="nav-icon">📝</span> Notes</a>
    <a href="resources.html"     class="nav-item"><span class="nav-icon">🔗</span> Resources</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user"><div class="user-avatar">U</div><div class="user-info"><div class="user-name">Loading…</div><div class="user-email"></div></div></div>
    <button class="nav-logout" id="logout-btn"><span class="nav-icon">🚪</span> Logout</button>
  </div>
</aside>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<header class="topbar">
  <div style="display:flex;align-items:center;gap:.75rem;">
    <button class="btn btn-icon btn-ghost" id="sidebar-toggle" style="display:none;">☰</button>
    <h1 class="topbar-title">📋 Assignments</h1>
  </div>
  <button class="btn btn-primary btn-sm" id="add-assign-btn">+ Add Assignment</button>
</header>

<main class="main-content">
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="Pending">Pending</button>
    <button class="filter-btn" data-filter="Submitted">Submitted</button>
    <button class="filter-btn" data-priority="High">🔴 High Priority</button>
    <button class="filter-btn" data-priority="Medium">🟡 Medium</button>
    <button class="filter-btn" data-priority="Low">🟢 Low</button>
  </div>
  <div id="assign-grid" class="assign-grid"></div>
</main>

<nav class="mobile-nav">
  <div class="mobile-nav-items">
    <a href="dashboard.html"     class="mobile-nav-item"><span class="mobile-nav-icon">🏠</span>Home</a>
    <a href="study-planner.html" class="mobile-nav-item"><span class="mobile-nav-icon">📚</span>Study</a>
    <a href="skills.html"        class="mobile-nav-item"><span class="mobile-nav-icon">🚀</span>Skills</a>
    <a href="roadmap.html"       class="mobile-nav-item"><span class="mobile-nav-icon">🗺️</span>AI</a>
    <a href="notes.html"         class="mobile-nav-item"><span class="mobile-nav-icon">📝</span>Notes</a>
  </div>
</nav>

<!-- MODAL -->
<div class="modal-overlay" id="assign-modal">
  <div class="modal" style="max-width:540px;">
    <div class="modal-header">
      <h2 class="modal-title" id="assign-modal-title">Add Assignment</h2>
      <button class="modal-close" onclick="closeModal('assign-modal')">✕</button>
    </div>
    <form id="assign-form" novalidate>
      <input type="hidden" id="assign-id" />
      <div class="form-group"><label class="form-label" for="assign-title">Title *</label><input type="text" id="assign-title" class="form-control" placeholder="Assignment title" /></div>
      <div class="form-group"><label class="form-label" for="assign-subject">Subject *</label><input type="text" id="assign-subject" class="form-control" placeholder="e.g. Data Structures" /></div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label" for="assign-priority">Priority *</label>
          <select id="assign-priority" class="form-control"><option value="">Select</option><option>Low</option><option>Medium</option><option>High</option></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="assign-status">Status *</label>
          <select id="assign-status" class="form-control"><option value="">Select</option><option>Pending</option><option>Submitted</option></select>
        </div>
      </div>
      <div class="form-group"><label class="form-label" for="assign-deadline">Deadline</label><input type="date" id="assign-deadline" class="form-control" /></div>
      <div class="form-group"><label class="form-label" for="assign-link">Submission Link</label><input type="url" id="assign-link" class="form-control" placeholder="https://…" /></div>
      <div class="form-group"><label class="form-label" for="assign-notes">Notes</label><textarea id="assign-notes" class="form-control" rows="3" placeholder="Any notes about this assignment…"></textarea></div>
      <div class="form-error" id="assign-form-error"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('assign-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="assign-save-btn">Save</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/firestore.js"></script>
<script src="js/assignments.js"></script>
</body>
</html>
