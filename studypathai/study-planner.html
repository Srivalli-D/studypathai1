<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Planner – StudyPath AI Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    .filter-bar { display:flex; flex-wrap:wrap; gap:.6rem; margin-bottom:1.25rem; }
    .filter-btn { padding:.35rem .85rem; border-radius:20px; font-size:.78rem; font-weight:500; border:1px solid var(--border); background:var(--bg-card); color:var(--text-muted); cursor:pointer; transition:all .2s; }
    .filter-btn.active { background:rgba(56,189,248,.15); color:var(--primary); border-color:rgba(56,189,248,.3); }
    .progress-section { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); padding:1.25rem; margin-bottom:1.25rem; }
    .progress-label { display:flex; justify-content:space-between; font-size:.83rem; margin-bottom:.6rem; }
    .task-list { display:flex; flex-direction:column; gap:.75rem; }
    .task-checkbox { width:20px; height:20px; border-radius:6px; border:2px solid var(--border-strong); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all .2s; background:transparent; }
    .task-checkbox.checked { background:linear-gradient(135deg,#38bdf8,#8b5cf6); border-color:transparent; }
    .task-checkbox.checked::after { content:'✓'; color:#fff; font-size:.75rem; font-weight:700; }
  </style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/guard.js"></script>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header"><a href="index.html" class="brand-wrap"><div class="brand-mark">S</div><div class="brand-text">StudyPath AI Pro <span>Career & Study Companion</span></div></a></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html"     class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
    <a href="performance.html"   class="nav-item"><span class="nav-icon">📊</span> Performance</a>
    <a href="roadmap.html"       class="nav-item"><span class="nav-icon">🗺️</span> AI Roadmap</a>
    <a href="study-planner.html" class="nav-item"><span class="nav-icon">📚</span> Study Planner</a>
    <a href="skills.html"        class="nav-item"><span class="nav-icon">🚀</span> Skills</a>
    <a href="applications.html"  class="nav-item"><span class="nav-icon">💼</span> Applications</a>
    <a href="assignments.html"   class="nav-item"><span class="nav-icon">📋</span> Assignments</a>
    <a href="notes.html"         class="nav-item"><span class="nav-icon">📝</span> Notes</a>
    <a href="resources.html"     class="nav-item"><span class="nav-icon">🔗</span> Resources</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user"><div class="user-avatar">U</div><div class="user-info"><div class="user-name">Loading…</div><div class="user-email"></div></div></div>
    <button class="nav-logout" id="logout-btn"><span class="nav-icon">🚪</span> Logout</button>
  </div>
</aside>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<header class="topbar">
  <div style="display:flex;align-items:center;gap:.75rem;">
    <button class="btn btn-icon btn-ghost" id="sidebar-toggle" style="display:none;">☰</button>
    <h1 class="topbar-title">📚 Study Planner</h1>
  </div>
  <button class="btn btn-primary btn-sm" id="add-task-btn">+ Add Task</button>
</header>

<main class="main-content">
  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-label"><span>Study Progress</span><span id="progress-text">0 / 0 completed</span></div>
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%;"></div></div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">All Tasks</button>
    <button class="filter-btn" data-filter="pending">Pending</button>
    <button class="filter-btn" data-filter="completed">Completed</button>
    <button class="filter-btn" data-priority="High">🔴 High</button>
    <button class="filter-btn" data-priority="Medium">🟡 Medium</button>
    <button class="filter-btn" data-priority="Low">🟢 Low</button>
  </div>

  <div id="task-list" class="task-list"></div>
</main>

<nav class="mobile-nav">
  <div class="mobile-nav-items">
    <a href="dashboard.html"     class="mobile-nav-item"><span class="mobile-nav-icon">🏠</span>Home</a>
    <a href="study-planner.html" class="mobile-nav-item active"><span class="mobile-nav-icon">📚</span>Study</a>
    <a href="skills.html"        class="mobile-nav-item"><span class="mobile-nav-icon">🚀</span>Skills</a>
    <a href="roadmap.html"       class="mobile-nav-item"><span class="mobile-nav-icon">🗺️</span>AI</a>
    <a href="notes.html"         class="mobile-nav-item"><span class="mobile-nav-icon">📝</span>Notes</a>
  </div>
</nav>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Add Study Task</h2>
      <button class="modal-close" onclick="closeModal('task-modal')">✕</button>
    </div>
    <form id="task-form" novalidate>
      <input type="hidden" id="task-id" />
      <div class="form-group"><label class="form-label" for="task-title">Task Title *</label><input type="text" id="task-title" class="form-control" placeholder="e.g. Solve 5 LeetCode problems" /></div>
      <div class="form-group"><label class="form-label" for="task-subject">Subject</label><input type="text" id="task-subject" class="form-control" placeholder="e.g. DSA, Web Dev" /></div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label" for="task-type">Type *</label>
          <select id="task-type" class="form-control"><option value="">Select type</option><option>Daily</option><option>Weekly</option></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="task-priority">Priority *</label>
          <select id="task-priority" class="form-control"><option value="">Select priority</option><option>Low</option><option>Medium</option><option>High</option></select>
        </div>
      </div>
      <div class="form-group"><label class="form-label" for="task-due">Due Date</label><input type="date" id="task-due" class="form-control" /></div>
      <div class="form-error" id="task-form-error"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('task-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="task-save-btn">Save Task</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/firestore.js"></script>
<script src="js/study.js"></script>
</body>
</html>
