<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In – StudyPath AI Pro</title>
  <meta name="description"
    content="Log in to your StudyPath AI Pro account and continue your study and career journey." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>

<body class="auth-page">

  <div class="auth-loading-overlay" id="auth-loading">
    <div class="spinner-lg"></div>
    <p style="font-size:.85rem;color:var(--text-muted);">Checking session…</p>
  </div>

  <!-- Firebase SDKs (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>

  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-brand">
        <div class="brand-mark lg">S</div>
        <div class="brand-text">StudyPath AI Pro <span>Career &amp; Study Companion</span></div>
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Log in to continue your study and career journey.</p>
    </div>

    <div class="auth-error-box" id="auth-error" role="alert">
      <span>⚠️</span><span id="auth-error-text"></span>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="you@email.com"
          autocomplete="email" required />
        <div class="form-error" id="email-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="password-toggle-wrap">
          <input type="password" id="password" name="password" class="form-control" placeholder="Your password"
            autocomplete="current-password" required />
          <button type="button" class="password-toggle-btn" id="toggle-pass" aria-label="Toggle password">👁️</button>
        </div>
        <div class="form-error" id="pass-error"></div>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;" id="login-btn">
        Log In
      </button>
    </form>

    <!-- Divider -->
    <div class="auth-divider">or</div>

    <!-- Google Sign-In Button -->
    <button type="button" class="btn-google" id="googleLoginBtn">
      <svg class="google-icon" viewBox="0 0 48 48" aria-hidden="true">
        <path fill="#EA4335"
          d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
        <path fill="#4285F4"
          d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
        <path fill="#FBBC05"
          d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
        <path fill="#34A853"
          d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
        <path fill="none" d="M0 0h48v48H0z" />
      </svg>
      Continue with Google
    </button>

    <div class="auth-footer-link">
      Don't have an account? <a href="signup.html">Sign up free</a>
    </div>
  </div>

  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>

  <script>
    // Hide loading overlay
    setTimeout(function () {
      var overlay = document.getElementById("auth-loading");
      if (overlay) overlay.classList.add("hidden");
    }, 500);

    // If already logged in → go to dashboard
    if (typeof auth !== "undefined" && auth) {
      auth.onAuthStateChanged(function (user) {
        if (user) window.location.replace("dashboard.html");
      });
    }

    // Password toggle
    document.getElementById("toggle-pass").addEventListener("click", function () {
      var inp = document.getElementById("password");
      inp.type = inp.type === "password" ? "text" : "password";
    });

    function clearErrors() {
      ["email-error", "pass-error"].forEach(function (id) {
        var el = document.getElementById(id);
        if (el) el.textContent = "";
      });
      document.querySelectorAll(".form-control.error").forEach(function (el) {
        el.classList.remove("error");
      });
      var errBox = document.getElementById("auth-error");
      if (errBox) errBox.classList.remove("visible");
    }

    function showAuthError(msg) {
      var box  = document.getElementById("auth-error");
      var text = document.getElementById("auth-error-text");
      if (box && text) { text.textContent = msg; box.classList.add("visible"); }
    }

    // ── Google Login ────────────────────────────────────────
    var googleBtn = document.getElementById("googleLoginBtn");
    if (googleBtn) {
      // Disable button if Firebase is not configured
      if (typeof auth === "undefined" || !auth) {
        googleBtn.disabled = true;
        googleBtn.title = "Firebase is not configured yet. Add your Firebase config first.";
      }

      googleBtn.addEventListener("click", async function () {
        clearErrors();
        showLoading(googleBtn, "Connecting…");
        try {
          await loginWithGoogle();
          // loginWithGoogle() handles redirect — no further action needed
        } catch (err) {
          hideLoading(googleBtn);
          showAuthError(friendlyAuthError(err));
        }
      });
    }

    // ── Email Login ─────────────────────────────────────────
    document.getElementById("login-form").addEventListener("submit", async function (e) {
      e.preventDefault();
      clearErrors();

      var email = document.getElementById("email").value.trim();
      var pass  = document.getElementById("password").value;
      var btn   = document.getElementById("login-btn");
      var valid = true;

      if (!email) {
        document.getElementById("email-error").textContent = "Email is required.";
        document.getElementById("email").classList.add("error");
        valid = false;
      }
      if (!pass) {
        document.getElementById("pass-error").textContent = "Password is required.";
        document.getElementById("password").classList.add("error");
        valid = false;
      }
      if (!valid) return;

      showLoading(btn, "Logging in…");
      try {
        await loginUser(email, pass);
        showSuccess("Login successful! Redirecting…");
        setTimeout(function () { window.location.href = "dashboard.html"; }, 900);
      } catch (err) {
        hideLoading(btn);
        showAuthError(friendlyAuthError(err));
      }
    });
  </script>
</body>

</html>
