<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – StudyPath AI Pro</title>
  <meta name="description" content="Create your free StudyPath AI Pro account and start organizing your studies and career journey." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-page">

<!-- Loading overlay -->
<div class="auth-loading-overlay" id="auth-loading">
  <div class="spinner-lg"></div>
  <p style="font-size:.85rem;color:var(--text-muted);">Checking session…</p>
</div>

<!-- Firebase SDKs (compat) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>

<div class="auth-card">
  <div class="auth-header">
    <div class="auth-brand">
      <div class="brand-mark lg">S</div>
      <div class="brand-text">StudyPath AI Pro <span>Career &amp; Study Companion</span></div>
    </div>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-subtitle">Start your premium study journey today — it's free.</p>
  </div>

  <div class="auth-error-box" id="auth-error" role="alert">
    <span>⚠️</span><span id="auth-error-text"></span>
  </div>

  <form id="signup-form" novalidate>
    <div class="form-group">
      <label class="form-label" for="fullname">Full Name</label>
      <input type="text" id="fullname" name="fullname" class="form-control"
             placeholder="Your full name" autocomplete="name" required />
      <div class="form-error" id="name-error"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email Address</label>
      <input type="email" id="email" name="email" class="form-control"
             placeholder="you@email.com" autocomplete="email" required />
      <div class="form-error" id="email-error"></div>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="password-toggle-wrap">
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Min. 6 characters" autocomplete="new-password" required />
        <button type="button" class="password-toggle-btn" id="toggle-pass" aria-label="Toggle password visibility">👁️</button>
      </div>
      <div class="form-error" id="pass-error"></div>
      <div class="form-hint">At least 6 characters</div>
    </div>

    <div class="form-group">
      <label class="form-label" for="confirm-password">Confirm Password</label>
      <div class="password-toggle-wrap">
        <input type="password" id="confirm-password" name="confirm-password" class="form-control"
               placeholder="Re-enter password" autocomplete="new-password" required />
        <button type="button" class="password-toggle-btn" id="toggle-confirm" aria-label="Toggle confirm password visibility">👁️</button>
      </div>
      <div class="form-error" id="confirm-error"></div>
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%;margin-top:.5rem;" id="signup-btn">
      Create Account
    </button>
  </form>

  <!-- Divider -->
  <div class="auth-divider">or</div>

  <!-- Google Sign-Up Button -->
  <button type="button" class="btn-google" id="googleSignupBtn">
    <svg class="google-icon" viewBox="0 0 48 48" aria-hidden="true">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      <path fill="none" d="M0 0h48v48H0z"/>
    </svg>
    Continue with Google
  </button>

  <div class="auth-footer-link">
    Already have an account? <a href="login.html">Log in</a>
  </div>
</div>

<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script>
  // Hide loading overlay
  setTimeout(function () {
    var overlay = document.getElementById("auth-loading");
    if (overlay) overlay.classList.add("hidden");
  }, 500);

  // If already logged in → go to dashboard
  if (typeof auth !== "undefined" && auth) {
    auth.onAuthStateChanged(function (user) {
      if (user) window.location.replace("dashboard.html");
    });
  }

  // Password visibility toggles
  document.getElementById("toggle-pass").addEventListener("click", function () {
    var inp = document.getElementById("password");
    inp.type = inp.type === "password" ? "text" : "password";
  });
  document.getElementById("toggle-confirm").addEventListener("click", function () {
    var inp = document.getElementById("confirm-password");
    inp.type = inp.type === "password" ? "text" : "password";
  });

  function showFieldError(id, msg) {
    var el = document.getElementById(id);
    if (el) el.textContent = msg;
    if (id.includes("name"))    { document.getElementById("fullname")?.classList.add("error"); }
    if (id.includes("email"))   { document.getElementById("email")?.classList.add("error"); }
    if (id === "pass-error")    { document.getElementById("password")?.classList.add("error"); }
    if (id.includes("confirm")) { document.getElementById("confirm-password")?.classList.add("error"); }
  }

  function clearErrors() {
    ["name-error","email-error","pass-error","confirm-error"].forEach(function (id) {
      var el = document.getElementById(id);
      if (el) el.textContent = "";
    });
    document.querySelectorAll(".form-control.error").forEach(function (el) {
      el.classList.remove("error");
    });
    var errBox = document.getElementById("auth-error");
    if (errBox) errBox.classList.remove("visible");
  }

  function showAuthError(msg) {
    var box  = document.getElementById("auth-error");
    var text = document.getElementById("auth-error-text");
    if (box && text) { text.textContent = msg; box.classList.add("visible"); }
  }

  // ── Google Sign-Up ──────────────────────────────────────
  var googleSignupBtn = document.getElementById("googleSignupBtn");
  if (googleSignupBtn) {
    // Disable button if Firebase is not configured
    if (typeof auth === "undefined" || !auth) {
      googleSignupBtn.disabled = true;
      googleSignupBtn.title = "Firebase is not configured yet. Add your Firebase config first.";
    }

    googleSignupBtn.addEventListener("click", async function () {
      clearErrors();
      showLoading(googleSignupBtn, "Connecting…");
      try {
        await loginWithGoogle();
        // loginWithGoogle() handles redirect — no further action needed
      } catch (err) {
        hideLoading(googleSignupBtn);
        showAuthError(friendlyAuthError(err));
      }
    });
  }

  // ── Email Sign-Up ───────────────────────────────────────
  document.getElementById("signup-form").addEventListener("submit", async function (e) {
    e.preventDefault();
    clearErrors();

    var name    = document.getElementById("fullname").value.trim();
    var email   = document.getElementById("email").value.trim();
    var pass    = document.getElementById("password").value;
    var confirm = document.getElementById("confirm-password").value;
    var btn     = document.getElementById("signup-btn");

    var valid = true;
    if (!name)              { showFieldError("name-error", "Full name is required."); valid = false; }
    if (!email)             { showFieldError("email-error", "Email is required."); valid = false; }
    else if (!/^[^@]+@[^@]+\.[^@]+$/.test(email)) { showFieldError("email-error", "Enter a valid email."); valid = false; }
    if (!pass)              { showFieldError("pass-error", "Password is required."); valid = false; }
    else if (pass.length < 6) { showFieldError("pass-error", "Password must be at least 6 characters."); valid = false; }
    if (pass !== confirm)   { showFieldError("confirm-error", "Passwords do not match."); valid = false; }
    if (!valid) return;

    showLoading(btn, "Creating account…");
    try {
      await signupUser(name, email, pass);
      showSuccess("Account created! Redirecting…");
      setTimeout(function () { window.location.href = "dashboard.html"; }, 1000);
    } catch (err) {
      hideLoading(btn);
      showAuthError(friendlyAuthError(err));
    }
  });
</script>
</body>
</html>
