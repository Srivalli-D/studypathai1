<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skill Tracker – StudyPath AI Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    .filter-bar{display:flex;flex-wrap:wrap;gap:.6rem;margin-bottom:1.25rem;}
    .filter-btn{padding:.35rem .85rem;border-radius:20px;font-size:.78rem;font-weight:500;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;transition:all .2s;}
    .filter-btn.active{background:rgba(56,189,248,.15);color:var(--primary);border-color:rgba(56,189,248,.3);}
    .avg-card{background:linear-gradient(135deg,rgba(56,189,248,.1),rgba(139,92,246,.1));border:1px solid rgba(56,189,248,.2);border-radius:var(--radius-md);padding:1.25rem 1.5rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1.5rem;}
    .avg-val{font-family:'Poppins',sans-serif;font-size:2.5rem;font-weight:800;background:linear-gradient(135deg,#38bdf8,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .skill-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.25rem;transition:all .25s;}
    .skill-card:hover{border-color:var(--border-strong);transform:translateY(-2px);}
    .skill-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem;}
    .skill-progress-row{display:flex;align-items:center;gap:.75rem;margin-top:.75rem;}
    .skill-pct{font-size:.78rem;font-weight:700;color:var(--primary);min-width:36px;text-align:right;}
  </style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/guard.js"></script>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header"><a href="index.html" class="brand-wrap"><div class="brand-mark">S</div><div class="brand-text">StudyPath AI Pro <span>Career & Study Companion</span></div></a></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html"     class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
    <a href="performance.html"   class="nav-item"><span class="nav-icon">📊</span> Performance</a>
    <a href="roadmap.html"       class="nav-item"><span class="nav-icon">🗺️</span> AI Roadmap</a>
    <a href="study-planner.html" class="nav-item"><span class="nav-icon">📚</span> Study Planner</a>
    <a href="skills.html"        class="nav-item"><span class="nav-icon">🚀</span> Skills</a>
    <a href="applications.html"  class="nav-item"><span class="nav-icon">💼</span> Applications</a>
    <a href="assignments.html"   class="nav-item"><span class="nav-icon">📋</span> Assignments</a>
    <a href="notes.html"         class="nav-item"><span class="nav-icon">📝</span> Notes</a>
    <a href="resources.html"     class="nav-item"><span class="nav-icon">🔗</span> Resources</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user"><div class="user-avatar">U</div><div class="user-info"><div class="user-name">Loading…</div><div class="user-email"></div></div></div>
    <button class="nav-logout" id="logout-btn"><span class="nav-icon">🚪</span> Logout</button>
  </div>
</aside>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<header class="topbar">
  <div style="display:flex;align-items:center;gap:.75rem;">
    <button class="btn btn-icon btn-ghost" id="sidebar-toggle" style="display:none;">☰</button>
    <h1 class="topbar-title">🚀 Skill Tracker</h1>
  </div>
  <button class="btn btn-primary btn-sm" id="add-skill-btn">+ Add Skill</button>
</header>

<main class="main-content">
  <div class="avg-card">
    <div><div class="avg-val" id="avg-progress">0%</div><div style="font-size:.85rem;color:var(--text-muted);">Average Skill Progress</div></div>
    <div style="flex:1;"><div class="progress-wrap"><div class="progress-bar" id="avg-bar" style="width:0%;"></div></div><div style="font-size:.72rem;color:var(--text-muted);margin-top:.4rem;" id="avg-sub">No skills tracked yet</div></div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="Programming">Programming</button>
    <button class="filter-btn" data-cat="DSA">DSA</button>
    <button class="filter-btn" data-cat="Web Development">Web Dev</button>
    <button class="filter-btn" data-cat="AI/ML">AI/ML</button>
    <button class="filter-btn" data-cat="Database">Database</button>
    <button class="filter-btn" data-cat="Soft Skills">Soft Skills</button>
    <button class="filter-btn" data-cat="Other">Other</button>
  </div>

  <div id="skills-grid" class="skill-grid"></div>
</main>

<nav class="mobile-nav">
  <div class="mobile-nav-items">
    <a href="dashboard.html"     class="mobile-nav-item"><span class="mobile-nav-icon">🏠</span>Home</a>
    <a href="study-planner.html" class="mobile-nav-item"><span class="mobile-nav-icon">📚</span>Study</a>
    <a href="skills.html"        class="mobile-nav-item active"><span class="mobile-nav-icon">🚀</span>Skills</a>
    <a href="roadmap.html"       class="mobile-nav-item"><span class="mobile-nav-icon">🗺️</span>AI</a>
    <a href="notes.html"         class="mobile-nav-item"><span class="mobile-nav-icon">📝</span>Notes</a>
  </div>
</nav>

<!-- MODAL -->
<div class="modal-overlay" id="skill-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="skill-modal-title">Add Skill</h2>
      <button class="modal-close" onclick="closeModal('skill-modal')">✕</button>
    </div>
    <form id="skill-form" novalidate>
      <input type="hidden" id="skill-id" />
      <div class="form-group"><label class="form-label" for="skill-name">Skill Name *</label><input type="text" id="skill-name" class="form-control" placeholder="e.g. React.js, Python" /></div>
      <div class="grid-2">
        <div class="form-group">
          <label class="form-label" for="skill-category">Category *</label>
          <select id="skill-category" class="form-control">
            <option value="">Select category</option>
            <option>Programming</option><option>DSA</option><option>Web Development</option>
            <option>AI/ML</option><option>Database</option><option>Soft Skills</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label" for="skill-level">Level *</label>
          <select id="skill-level" class="form-control">
            <option value="">Select level</option>
            <option>Beginner</option><option>Intermediate</option><option>Advanced</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="skill-progress">Progress: <span id="progress-display">0</span>%</label>
        <input type="range" id="skill-progress" min="0" max="100" value="0" style="width:100%;accent-color:var(--primary);" />
      </div>
      <div class="form-error" id="skill-form-error"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('skill-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="skill-save-btn">Save Skill</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/firestore.js"></script>
<script src="js/skills.js"></script>
</body>
</html>
