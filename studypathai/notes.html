<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes – StudyPath AI Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <style>
    .notes-controls{display:flex;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap;}
    .search-wrap{position:relative;flex:1;min-width:200px;}
    .search-wrap input{padding-left:2.4rem;}
    .search-icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:.9rem;}
    .filter-bar{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.25rem;}
    .filter-btn{padding:.3rem .75rem;border-radius:20px;font-size:.75rem;font-weight:500;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);cursor:pointer;transition:all .2s;}
    .filter-btn.active{background:rgba(56,189,248,.15);color:var(--primary);border-color:rgba(56,189,248,.3);}
    .notes-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem;}
    .note-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:1.25rem;display:flex;flex-direction:column;gap:.75rem;transition:all .25s;cursor:pointer;}
    .note-card:hover{border-color:var(--border-strong);transform:translateY(-2px);}
    .note-title{font-size:.95rem;font-weight:700;}
    .note-preview{font-size:.8rem;color:var(--text-muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
    .note-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;}
  </style>
</head>
<body>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/guard.js"></script>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header"><a href="index.html" class="brand-wrap"><div class="brand-mark">S</div><div class="brand-text">StudyPath AI Pro <span>Career & Study Companion</span></div></a></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html"     class="nav-item"><span class="nav-icon">🏠</span> Dashboard</a>
    <a href="performance.html"   class="nav-item"><span class="nav-icon">📊</span> Performance</a>
    <a href="roadmap.html"       class="nav-item"><span class="nav-icon">🗺️</span> AI Roadmap</a>
    <a href="study-planner.html" class="nav-item"><span class="nav-icon">📚</span> Study Planner</a>
    <a href="skills.html"        class="nav-item"><span class="nav-icon">🚀</span> Skills</a>
    <a href="applications.html"  class="nav-item"><span class="nav-icon">💼</span> Applications</a>
    <a href="assignments.html"   class="nav-item"><span class="nav-icon">📋</span> Assignments</a>
    <a href="notes.html"         class="nav-item"><span class="nav-icon">📝</span> Notes</a>
    <a href="resources.html"     class="nav-item"><span class="nav-icon">🔗</span> Resources</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user"><div class="user-avatar">U</div><div class="user-info"><div class="user-name">Loading…</div><div class="user-email"></div></div></div>
    <button class="nav-logout" id="logout-btn"><span class="nav-icon">🚪</span> Logout</button>
  </div>
</aside>
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<header class="topbar">
  <div style="display:flex;align-items:center;gap:.75rem;">
    <button class="btn btn-icon btn-ghost" id="sidebar-toggle" style="display:none;">☰</button>
    <h1 class="topbar-title">📝 Notes</h1>
  </div>
  <button class="btn btn-primary btn-sm" id="add-note-btn">+ Add Note</button>
</header>

<main class="main-content">
  <div class="notes-controls">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="note-search" class="form-control" placeholder="Search notes…" />
    </div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn active" data-cat="all">All</button>
    <button class="filter-btn" data-cat="DSA">DSA</button>
    <button class="filter-btn" data-cat="Web Development">Web Dev</button>
    <button class="filter-btn" data-cat="AI/ML">AI/ML</button>
    <button class="filter-btn" data-cat="Interview Prep">Interview</button>
    <button class="filter-btn" data-cat="College">College</button>
    <button class="filter-btn" data-cat="Personal">Personal</button>
    <button class="filter-btn" data-cat="Other">Other</button>
  </div>
  <div id="notes-grid" class="notes-grid"></div>
</main>

<nav class="mobile-nav">
  <div class="mobile-nav-items">
    <a href="dashboard.html"     class="mobile-nav-item"><span class="mobile-nav-icon">🏠</span>Home</a>
    <a href="study-planner.html" class="mobile-nav-item"><span class="mobile-nav-icon">📚</span>Study</a>
    <a href="skills.html"        class="mobile-nav-item"><span class="mobile-nav-icon">🚀</span>Skills</a>
    <a href="roadmap.html"       class="mobile-nav-item"><span class="mobile-nav-icon">🗺️</span>AI</a>
    <a href="notes.html"         class="mobile-nav-item active"><span class="mobile-nav-icon">📝</span>Notes</a>
  </div>
</nav>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="note-modal">
  <div class="modal" style="max-width:580px;">
    <div class="modal-header">
      <h2 class="modal-title" id="note-modal-title">Add Note</h2>
      <button class="modal-close" onclick="closeModal('note-modal')">✕</button>
    </div>
    <form id="note-form" novalidate>
      <input type="hidden" id="note-id" />
      <div class="form-group"><label class="form-label" for="note-title">Title *</label><input type="text" id="note-title" class="form-control" placeholder="Note title" /></div>
      <div class="form-group">
        <label class="form-label" for="note-category">Category *</label>
        <select id="note-category" class="form-control">
          <option value="">Select category</option>
          <option>DSA</option><option>Web Development</option><option>AI/ML</option>
          <option>Interview Prep</option><option>College</option><option>Personal</option><option>Other</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label" for="note-content">Content *</label><textarea id="note-content" class="form-control" rows="6" placeholder="Write your note here…"></textarea></div>
      <div class="form-error" id="note-form-error"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal('note-modal')">Cancel</button>
        <button type="submit" class="btn btn-primary" id="note-save-btn">Save Note</button>
      </div>
    </form>
  </div>
</div>

<!-- VIEW MODAL -->
<div class="modal-overlay" id="note-view-modal">
  <div class="modal" style="max-width:600px;">
    <div class="modal-header">
      <h2 class="modal-title" id="view-note-title">Note</h2>
      <button class="modal-close" onclick="closeModal('note-view-modal')">✕</button>
    </div>
    <div><span class="badge badge-primary" id="view-note-cat"></span></div>
    <div id="view-note-content" style="margin-top:1rem;font-size:.88rem;line-height:1.7;color:var(--text-soft);white-space:pre-wrap;"></div>
    <div class="modal-footer" style="justify-content:flex-start;">
      <button class="btn btn-ghost btn-sm" id="view-edit-btn">Edit</button>
      <button class="btn btn-danger btn-sm" id="view-delete-btn">Delete</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="js/ui.js"></script>
<script src="js/auth.js"></script>
<script src="js/firestore.js"></script>
<script src="js/notes.js"></script>
</body>
</html>
